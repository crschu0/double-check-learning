<!DOCTYPE html>
<html>
<head>
  <title>Prime Time Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1E73BE, #2ECC71);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 50px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      margin: 5px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      color: black;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px 15px;
    }

    th {
      background: #1E73BE;
      color: white;
    }

    .code {
      margin-top: 20px;
      font-size: 20px;
      background: white;
      color: #333;
      padding: 8px;
      display: inline-block;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>PRIME TIME</h1>
  <h2>Double Check Learning</h2>
  <p>Mr Schuchard</p>

  <div class="code">
    Freckle Code: wpcs9p
  </div>

  <h2>Add Student</h2>

  <input id="name" placeholder="Student Name">
  <input id="score" placeholder="Score">
  <button onclick="addStudent()">Add</button>

  <h2>Class Tracker</h2>

  <table id="table">
    <tr>
      <th>Name</th>
      <th>Score</th>
    </tr>
  </table>

  <script>
    function addStudent() {
      const name = document.getElementById("name").value;
      const score = document.getElementById("score").value;

      if (name === "" || score === "") return;

      const table = document.getElementById("table");
      const row = table.insertRow();

      row.insertCell(0).innerText = name;
      row.insertCell(1).innerText = score;

      document.getElementById("name").value = "";
      document.getElementById("score").value = "";
    }
  </script>

</body>
</html>


  <div class="code">
    Freckle Code: wpcs9p
  </div>

</body>
</html>
